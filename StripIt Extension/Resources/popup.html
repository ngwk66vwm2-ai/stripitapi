<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Strip It for Safari</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; list-style: none; }
    body {
      font-family: -apple-system, sans-serif;
      background: #1a1a1a;
      color: white;
      width: 280px;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .header .icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      flex-shrink: 0;
    }
    .header .text {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .header h1 {
      font-size: 17px;
      font-weight: 800;
      color: #fff;
      margin: 0;
      letter-spacing: -0.2px;
    }
    .header p {
      font-size: 13px;
      font-weight: 700;
      color: #10B981;
      margin-top: 4px;
    }
    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: -apple-system, sans-serif;
      letter-spacing: -0.2px;
      transition: opacity 0.1s;
    }
    .btn:active { opacity: 0.8; }
    .btn-primary {
      background: #10B981;
      color: #1a1a1a;
    }
    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.07);
      margin: 16px 0;
    }
    .features {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }
    .feature {
      font-size: 12px;
      color: #ccc;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="images/icon-128.png" class="icon" alt="">
    <div class="text">
      <h1>Strip It for Safari</h1>
      <p>Strip the mess, read the rest</p>
    </div>
  </div>
  <button class="btn btn-primary" id="printBtn">Strip It</button>
  <hr class="divider">
  <div class="features">
    <div class="feature">✓ Removes ads and clutter</div>
    <div class="feature">✓ Clean typography and layout</div>
    <div class="feature">✓ Great for articles and recipes</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
